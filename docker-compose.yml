services:
  mongo:
    image: mongo:7
    container_name: training-blog-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  backend:
    image: node:20-alpine
    container_name: training-blog-backend
    working_dir: /app
    depends_on:
      mongo:
        condition: service_healthy
    env_file:
      - ./backend/.env
    environment:
      - MONGO_URI=mongodb://mongo:27017/blog-app
      - NODE_ENV=development
    command: sh -c "npm install && npm run dev"
    ports:
      - "5001:5000"
    volumes:
      - ./backend:/app
      - /app/node_modules

  frontend:
    image: node:20-alpine
    container_name: training-blog-frontend
    working_dir: /app
    depends_on:
      - backend
    environment:
      - NODE_ENV=development
      - VITE_API_URL=http://128.140.5.247:5001/api/posts
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5173"
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  mongo_data:
